<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-black to-gray-900 flex justify-center items-center h-screen text-white">

<div class="bg-white/10 backdrop-blur-lg p-8 rounded-2xl shadow-xl w-96">

  <h2 class="text-3xl text-center mb-6">Login</h2>

  <input placeholder="Email" class="w-full p-3 mb-3 bg-gray-800 rounded">
  <input type="password" placeholder="Password" class="w-full p-3 mb-4 bg-gray-800 rounded">

  <button onclick="login()" class="w-full bg-purple-600 p-3 rounded hover:bg-purple-700">
    Sign In
  </button>

</div>

<script>
function login(){
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
